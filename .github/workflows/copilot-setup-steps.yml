name: Copilot Setup Steps
on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Enable corepack for yarn
        run: corepack enable
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install --upgrade platformio setuptools cpplint
          
      - name: Verify installations
        run: |
          node --version
          yarn --version
          python3 --version
          pip --version
          pio --version
          cpplint --version